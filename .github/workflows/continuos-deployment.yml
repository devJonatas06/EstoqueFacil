name: EstoqueFacil CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACESS_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verificar pom.xml
        run: cat pom.xml | grep -A 5 "java-jwt"

      - name: Limpar tudo e baixar dependências
        run: |
          rm -rf ~/.m2/repository
          mvn dependency:purge-local-repository
          mvn dependency:resolve -U

      - name: Compilar e testar dependência específica
        run: mvn dependency:get -Dartifact=com.auth0:java-jwt:4.4.0

      - name: Build do projeto
        run: mvn clean package -DskipTests -X

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/estoquefacil-api:latest .

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/estoquefacil-api:latest