name: EstoqueFacil CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_ACESS_TOKEN}}

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Clear ALL Maven cache
        run: rm -rf ~/.m2/repository

      - name: Build with Maven (no cache)
        run: mvn clean package -DskipTests -U

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME}}/estoquefacil-api:latest .

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME}}/estoquefacil-api:latest