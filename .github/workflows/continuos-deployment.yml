name: EstoqueFacil CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACESS_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Clear Maven cache (fix for JWT dependency)
        run: rm -rf ~/.m2/repository/com/auth0

      - name: Build with Maven
        run: mvn clean package -DskipTests


      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/estoquefacil-api:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/estoquefacil-api:build-${{ github.run_number }} .

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/estoquefacil-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/estoquefacil-api:build-${{ github.run_number }}
