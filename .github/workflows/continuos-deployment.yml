name: EstoqueFacil CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build (com testes)
        run: mvn clean verify -U

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_ACESS_TOKEN}}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/estoquefacil-api:latest .

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME}}/estoquefacil-api:latest