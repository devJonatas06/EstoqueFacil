version: "3.8"

services:
  app:
    image: your-app-image:latest
    container_name: estoquefacil-app
    ports:
      - "${PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/EstoqueFacil}"
      SPRING_DATASOURCE_USERNAME: "${SPRING_DATASOURCE_USERNAME:-postgres}"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}"
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
      JWT_SECRET: "${JWT_SECRET}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:4200}"
      SPRINGDOC_API_DOCS_PATH: "/v3/api-docs"
      SPRINGDOC_SWAGGER_UI_PATH: "/swagger-ui.html"
      SPRINGDOC_SWAGGER_UI_ENABLED: "true"
      SPRINGDOC_SWAGGER_UI_OPERATIONS_SORTER: "alpha"
      SPRINGDOC_SWAGGER_UI_TAGS_SORTER: "alpha"
      LOGGING_LEVEL_ROOT: "INFO"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: estoquefacil-db
    environment:
      POSTGRES_USER: "${SPRING_DATASOURCE_USERNAME:-postgres}"
      POSTGRES_PASSWORD: "${SPRING_DATASOURCE_PASSWORD:-postgres}"
      POSTGRES_DB: "EstoqueFacil"
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

volumes:
  db-data:
