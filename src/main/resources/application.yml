spring:
  application:
    name: estoque-facil
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false

api:
  security:
    token:
      secret: ${JWT_SECRET}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

server:
  port: ${PORT:8080}

cors:
  allowed-origins: http://localhost:4200,http://localhost:4201
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: alpha
    tagsSorter: alpha

logging:
  level:
    root: WARN
    org.springframework: WARN
    org.hibernate: ERROR
    com.project.EstoqueFacil: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      group:
        liveness:
          include: ping
          show-details: never
        readiness:
          include: db,diskSpace
          show-details: when_authorized
        tech:
          include: db,diskSpace
          show-details: always
  metrics:
    enable:
      jvm: true
      process: true
      system: true
      http:
        server:
          requests: true