dspring.datasource.url=${SPRING_DATASOURCE_URL}spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=false

api.security.token.secret=${JWT_SECRET}
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

server.port=${PORT:8080}
cors.allowed-origins=http://localhost:4200,http://localhost:4201
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR
logging.level.org.springdoc=INFO
logging.level.com.project.EstoqueFacil=DEBUG


# ===== EXPOSIÇÃO DE ENDPOINTS =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# ===== HEALTH CHECKS =====
management.endpoint.health.show-details=always

# ===== HEALTH GROUPS =====
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.liveness.show-details=never

# Readiness (verifica dependências reais)
management.endpoint.health.group.readiness.include=db,diskSpace
management.endpoint.health.group.readiness.show-details=when_authorized

# Tech ( infra vê tudo)
management.endpoint.health.group.tech.include=db,diskSpace
management.endpoint.health.group.tech.show-details=always

management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.http.server.requests=true

# ===== PORTA =====
